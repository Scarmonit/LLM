name: Complete Optimization Workflow
on:
  push:
    branches: [ "feat/bridge-demo-hardened", "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      optimization_type:
        description: 'Type of optimization to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - bridge-demo
          - ultra-demo
          - performance
      custom_text:
        description: 'Custom text for analysis (optional)'
        required: false
        type: string

jobs:
  bridge-demo-test:
    runs-on: ubuntu-latest
    if: contains(github.event.inputs.optimization_type, 'bridge-demo') || github.event.inputs.optimization_type == 'all' || github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Run bridge demo
        run: |
          echo "Running bridge demo..."
          node examples/bridge-demo.js | tee bridge-results.json
          test -s bridge-results.json
      - name: Upload bridge results
        uses: actions/upload-artifact@v4
        with:
          name: bridge-demo-results
          path: bridge-results.json
      - name: Bridge demo summary
        run: |
          echo "### 🌉 Bridge Demo Results" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat bridge-results.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  ultra-demo-test:
    runs-on: ubuntu-latest
    if: contains(github.event.inputs.optimization_type, 'ultra-demo') || github.event.inputs.optimization_type == 'all' || github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Run ultra-optimized demo
        env:
          LOG_LEVEL: info
          COMPRESSION_THRESHOLD: 1024
        run: |
          echo "Running ultra-optimized demo..."
          node examples/bridge-demo-ultra.js | tee ultra-results.json
          test -s ultra-results.json
      - name: Upload ultra results
        uses: actions/upload-artifact@v4
        with:
          name: ultra-demo-results
          path: ultra-results.json
      - name: Ultra demo summary
        run: |
          echo "### ⚡ Ultra-Optimized Demo Results" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat ultra-results.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  performance-optimization:
    runs-on: ubuntu-latest
    if: contains(github.event.inputs.optimization_type, 'performance') || github.event.inputs.optimization_type == 'all' || github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Run performance optimizer
        run: |
          echo "Running performance optimization analysis..."
          node scripts/performance-optimizer.js | tee perf-results.json
          test -s perf-results.json
      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: perf-results.json
      - name: Performance summary
        run: |
          echo "### 📊 Performance Optimization Results" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat perf-results.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Run validation
        run: |
          npm run lint
          npm run format:check
          npm run test
      - name: Validation summary
        run: |
          echo "### ✅ Code Quality Validation" >> $GITHUB_STEP_SUMMARY
          echo "All linting, formatting, and tests passed successfully" >> $GITHUB_STEP_SUMMARY
